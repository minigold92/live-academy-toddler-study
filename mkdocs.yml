site_name: 라이브 아카데미 토들러 학습 노트
site_description: 왕초보 영어회화 96편 — 트랜스크립트 기반 학습 자료 + AI 인터랙션 프롬프트
site_author: minigold92
site_url: https://live-eng.minigold92.co.kr/

repo_name: minigold92/live-academy-toddler-study
repo_url: https://github.com/minigold92/live-academy-toddler-study
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.prune
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/adsense.js

extra:
  social:
    - icon: material/heart
      link: https://github.com/sponsors/minigold92
      name: 후원하기 (GitHub Sponsors)
    - icon: fontawesome/brands/github
      link: https://github.com/minigold92/live-academy-toddler-study
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/playlist?list=PLEzsBdrpZXC8tdzAqQHEQ66TocGI-Kagh

copyright: |
  강의 원작자: <a href="https://www.youtube.com/@LiveAcademyToddler">새벽1시의 영어교실 라이브 아카데미 토들러</a>
  · 학습 자료는 학습 보조 목적의 비상업적 정리물입니다.

